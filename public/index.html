<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chim Anjuro - Creative Professional</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        color: #e8e8e8;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
        overflow: hidden;
      }

      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Background grid */
      .grid-bg {
        position: absolute;
        inset: 0;
        opacity: 0.05;
        background-image:
          linear-gradient(90deg, rgba(255, 140, 0, 0.3) 1px, transparent 1px),
          linear-gradient(rgba(255, 140, 0, 0.3) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 10;
        text-align: center;
      }

      .loading-orb {
        position: absolute;
        border-radius: 50%;
        opacity: 0.2;
      }

      .orb-1 {
        top: 20%;
        left: 10%;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(255, 140, 0, 0.3) 0%,
          transparent 70%
        );
        animation: float 4s ease-in-out infinite;
      }

      .orb-2 {
        bottom: 20%;
        right: 10%;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(255, 140, 0, 0.2) 0%,
          transparent 70%
        );
        animation: float 5s ease-in-out infinite 0.5s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) translateX(0px);
        }

        50% {
          transform: translateY(-30px) translateX(20px);
        }
      }

      .logo-wrapper {
        margin-bottom: 40px;
        position: relative;
        width: 200px;
        height: 200px;
        margin-left: auto;
        margin-right: auto;
      }

      .logo-center {
        position: absolute;
        inset: 20px;
        background: linear-gradient(135deg, #ff8c00 0%, #ff6b35 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        font-weight: bold;
        color: white;
        box-shadow: 0 0 50px rgba(255, 140, 0, 0.6);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 50px rgba(255, 140, 0, 0.6);
        }

        50% {
          box-shadow: 0 0 80px rgba(255, 140, 0, 0.9);
        }
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        background: linear-gradient(90deg, #ff8c00 0%, #ff6b35 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 700;
        letter-spacing: -1px;
      }

      .subtitle {
        font-size: 1.2rem;
        color: #ff8c00;
        letter-spacing: 2px;
        margin-bottom: 30px;
        font-weight: 300;
      }

      .loading-bar {
        width: 200px;
        height: 3px;
        background: rgba(255, 140, 0, 0.2);
        border-radius: 2px;
        margin-left: auto;
        margin-right: auto;
        overflow: hidden;
      }

      .loading-progress {
        height: 100%;
        background: linear-gradient(90deg, #ff8c00 0%, #ff6b35 100%);
        animation: load 4s ease-in-out forwards;
      }

      @keyframes load {
        0% {
          width: 0%;
        }

        100% {
          width: 100%;
        }
      }

      .redirect-message {
        position: absolute;
        bottom: 30px;
        color: #888;
        font-size: 0.9rem;
        opacity: 0;
        animation: fadeIn 2s ease-in-out 2s forwards;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
        }

        100% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="grid-bg"></div>

      <div class="loading-orb orb-1"></div>
      <div class="loading-orb orb-2"></div>

      <div class="content">
        <div class="logo-wrapper">
          <div class="logo-center">CA</div>
        </div>

        <h1>Chim Anjuro</h1>

        <p class="subtitle">CREATIVE PROFESSIONAL</p>

        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>

        <p class="redirect-message">Redirecting to portfolio...</p>
      </div>
    </div>

    <script>
      // Redirect to Next.js app after 4 seconds
      setTimeout(() => {
        window.location.href = "/";
      }, 4000);
    </script>
  </body>
</html>
